name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Lint
        run: |
          if [ "$ACT" = "true" ]; then
            ./.venv/bin/python -m flake8 src/ tests/ --max-line-length=88 --extend-ignore=E203
            ./.venv/bin/python -m black --check src/ tests/
          else
            python -m pip install --upgrade pip
            pip install flake8 black
            flake8 src/ tests/ --max-line-length=88 --extend-ignore=E203
            black --check src/ tests/
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run tests
        run: |
          if [ "$ACT" = "true" ]; then
            ./.venv/bin/python -m pytest tests/ -v --cov=src --cov-report=term-missing
          else
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pytest tests/ -v --cov=src --cov-report=term-missing
          fi
